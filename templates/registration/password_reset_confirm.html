{% extends "base.html" %}

{% block content %}

<div class="glass-card p-5 mx-auto"
     style="max-width:500px;">

    <h2 class="fw-bold mb-4 text-center">

        🔑 Set New Password

    </h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit"
                class="btn btn-success w-100">

            Update Password

        </button>

    </form>

</div>

{% endblock %}
