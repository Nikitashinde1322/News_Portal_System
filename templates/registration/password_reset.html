{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}

<div class="glass-card p-5 mx-auto"
     style="max-width:500px;">

    <h2 class="fw-bold mb-4 text-center">

        🔒 Reset Password

    </h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit"
                class="btn btn-primary w-100">

            Send Reset Link

        </button>

    </form>

</div>

{% endblock %}
